name: Build MK Quiz Creator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix build.gradle
        run: |
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          export PATH=$PWD/gradle-8.4/bin:$PATH
          gradle assembleDebug --no-daemon

      - name: Find APK
        run: find . -name "*.apk" || echo "No APK"

      - uses: actions/upload-artifact@v4
        with:
          name: MK-Quiz-Creator-Debug
          path: "**/*.apk"
          if-no-files-found: warn
